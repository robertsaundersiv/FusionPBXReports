services:
  db:
    image: postgres:16
    container_name: fpbx-analytics-db
    environment:
      POSTGRES_DB: ${DB_NAME:-phonereports}
      POSTGRES_USER: ${DB_USER:-phonereports_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-phonereports_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-phonereports_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-network

  redis:
    image: redis:7-alpine
    container_name: fpbx-analytics-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fpbx-analytics-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-phonereports_user}:${DB_PASSWORD:-phonereports_pass}@db:5432/${DB_NAME:-phonereports}
      REDIS_URL: redis://redis:6379/0
      FUSIONPBX_HOST: ${FUSIONPBX_HOST}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-phonereports}
      DB_USER: ${DB_USER:-phonereports_user}
      DB_PASSWORD: ${DB_PASSWORD:-phonereports_pass}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app
    networks:
      - analytics-network
    command: sh -c "python -m alembic upgrade head && python -m scripts.seed && (python -m scripts.sync_metadata_only || true) && (python -m scripts.sync_extensions || true) && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: fpbx-analytics-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-phonereports_user}:${DB_PASSWORD:-phonereports_pass}@db:5432/${DB_NAME:-phonereports}
      REDIS_URL: redis://redis:6379/0
      FUSIONPBX_HOST: ${FUSIONPBX_HOST}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./worker:/app
    networks:
      - analytics-network
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: fpbx-analytics-beat
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-phonereports_user}:${DB_PASSWORD:-phonereports_pass}@db:5432/${DB_NAME:-phonereports}
      REDIS_URL: redis://redis:6379/0
      FUSIONPBX_HOST: ${FUSIONPBX_HOST}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./worker:/app
    networks:
      - analytics-network
    command: celery -A app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_GIT_SHA: ${GIT_COMMIT:-unknown}
        VITE_APP_BUILD_TIME: ${BUILD_TIMESTAMP:-unknown}
    container_name: fpbx-analytics-frontend
    depends_on:
      - backend
    networks:
      - analytics-network

  nginx:
    image: nginx:alpine
    container_name: fpbx-analytics-nginx
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: ^NGINX_SERVER_NAME$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - analytics-network

volumes:
  postgres_data:
  redis_data:

networks:
  analytics-network:
    driver: bridge
